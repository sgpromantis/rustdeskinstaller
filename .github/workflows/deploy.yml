name: Build and Deploy Django App
run-name: Deploy Django app to rustdesk.promantis.de

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/sgpromantis/rustdeskinstaller
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GHBEARER: ${{ secrets.GHBEARER }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        with:
          host: ${{ vars.RUSTDESK_SERVER }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHBEARER,DJANGO_SECRET_KEY
          script: |
            cd ${{ vars.DEPLOY_PATH }}

            # Write .env from GitHub secrets/variables — no manual editing needed
            cat > .env << EOF
            GHUSER=sgpromantis
            GHBEARER=${GHBEARER}
            REPONAME=rustdeskinstaller
            SECRET_KEY=${DJANGO_SECRET_KEY}
            DOMAIN=promantis.de
            EOF

            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans
